<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ algorithm|title }} Visualizer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header>
        <h1>{{ algorithm|title }} Visualizer</h1>
        <p>Watch the algorithm in action</p>
    </header>

    <div class="container">
        <a href="/" class="back-link">← Back to Home</a>

        <div class="visualizer-container">
            <div class="canvas-section">
                <canvas id="canvas" width="600" height="400"></canvas>
            </div>

            <div class="controls-section">
                <h3>Controls</h3>

                <div class="control-group">
                    <label for="numberList">Enter a list of numbers:</label>
                    <input type="text" id="numberList" placeholder="Example: 5, 2, 9, 1, 7">
                </div>

                <div class="button-group">
                    <button class="btn-control" type="button" onclick="loadList()">Load List</button>
                </div>

                <div class="control-group">
                    <label for="speed">Speed:</label>
                    <input type="range" id="speed" min="1" max="100" value="50">
                </div>

                <div class="button-group">
                    <button class="btn-control" type="button">Start</button>
                    <button class="btn-control" type="button">Pause</button>
                    <button class="btn-control" type="button" onclick="resetCanvas()">Reset</button>
                </div>
            </div>
        </div>

        <div class="info-section">
            <h3>{{ algorithm|title }}</h3>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">Time Complexity</div>
                    <div class="stat-value">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Space Complexity</div>
                    <div class="stat-value">-</div>
                </div>
            </div>
            <p>Algorithm description goes here.</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Algorithm Visualizer. All rights reserved.</p>
    </footer>

    <script>
        const algorithm = '{{ algorithm }}';
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const listInput = document.getElementById('numberList');
        let numbers = [];

        function parseList(value) {
            return value
                .split(',')
                .map(item => item.trim())
                .filter(item => item !== '')
                .map(item => Number(item))
                .filter(item => Number.isFinite(item));
        }

        function drawCanvas() {
            ctx.fillStyle = '#f4f4f4';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (numbers.length === 0) {
                ctx.fillStyle = '#667eea';
                ctx.font = '20px Segoe UI';
                ctx.fillText('Enter a list and click Load List', 140, 200);
                return;
            }

            const maxValue = Math.max(...numbers);
            const barWidth = canvas.width / numbers.length;

            numbers.forEach((value, index) => {
                const barHeight = (value / maxValue) * 320;
                const x = index * barWidth + 8;
                const y = canvas.height - barHeight - 30;

                ctx.fillStyle = '#667eea';
                ctx.fillRect(x, y, barWidth - 16, barHeight);

                ctx.fillStyle = '#333';
                ctx.font = '14px Segoe UI';
                ctx.fillText(String(value), x + 4, canvas.height - 10);
            });
        }

        function loadList() {
            numbers = parseList(listInput.value);
            drawCanvas();
        }

        function resetCanvas() {
            numbers = [];
            listInput.value = '';
            drawCanvas();
        }

        window.onload = function () {
            drawCanvas();
        };
    </script>
</body>

</html>
